<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>山青院订单管理后台</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
padding: 20px 10px;
background:#f5f7fa;
font-family:Arial;
max-width: 100vw;
overflow-x: hidden;
}
.login{
max-width:400px;
margin:50px auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 2px 10px #00000010;
width: 90%;
}
.login input{
width:100%;padding:12px;margin:10px 0;
border:1px solid #ddd;border-radius:5px;
}
.login button{
width:100%;padding:12px;background:#007bff;
color:white;border:none;border-radius:5px;
}
.container{
display:none;max-width:none;width:98%;margin:0 auto;
background:white;padding:20px 15px;border-radius:10px;
box-shadow:0 2px 10px #00000010;
}
h1{margin-bottom:5px;text-align:center;font-size:20px;}
.status-desc {
text-align:left;font-size:14px;color:#333;margin-bottom:8px;
padding-left:5px;line-height:1.6;
}
.color-tag {
display:inline-block;width:12px;height:12px;border-radius:2px;
margin-right:5px;vertical-align:middle;
}
.tag-white { background:#fff; border:1px solid #ddd; }
.tag-blue { background:#e6f7ff; }
.tag-red { background:#fff2f0; }
.db-modify-desc {
text-align:left;font-size:13px;color:#666;margin-bottom:15px;
padding-left:5px;line-height:1.5;
}
.search-tools{
display:flex;gap:10px;margin-bottom:15px;
flex-wrap:wrap;align-items:center;
}
.search-tools input{
padding:8px 10px;border:1px solid #ddd;
border-radius:5px;width:200px;
}
.search-tools button{
padding:8px 16px;background:#007bff;
color:white;border:none;border-radius:5px;cursor:pointer;
}
.tools{
display:flex;gap:8px;margin-bottom:15px;
align-items:center;justify-content:space-between;flex-wrap:wrap;
}
button{
padding:8px 16px;background:#007bff;
color:white;border:none;border-radius:5px;cursor:pointer;
}
.refresh-amount-btn {
background:#28a745;padding:6px 10px;font-size:12px;margin-right:5px;
}
button.del-btn{ background:#dc3545;padding:6px 10px;font-size:12px; }
button.exit-btn{background:#6c757d}
.table-container{ overflow-x:auto;margin:10px 0; }
table{ width:100%;min-width:1700px;border-collapse:collapse; }
th,td{
border:1px solid #ddd;padding:8px 6px;
text-align:center;white-space:nowrap;font-size:13px;
}
th{background:#f8f9fa}
.id-col{width:80px}
.time-col{width:150px}
.name-col{width:80px}
.phone-col{width:110px}
.paytype-col{width:100px}
.pay-record-col{width:250px;}
.pay-screenshot-col{width:220px;}
.money-col{width:80px}
.oper-col{width:140px}
.class-col{width:120px}
.pay-record {
white-space:pre-line;text-align:left;padding:5px;line-height:1.4;
}
.pay-img-list { display:flex;flex-wrap:wrap;gap:4px;justify-content:center; }
.pay-img-item {
width:40px;height:40px;object-fit:cover;
border-radius:4px;cursor:pointer;border:1px solid #ddd;
}
.row-modify { background-color:#fff2f0 !important }
.row-multi-submit { background-color:#e6f7ff !important }
.row-first-submit { background-color:#fff !important }

/* 弹窗优化（大弹窗） */
.modal {
position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.85);display:none;
justify-content:center;align-items:center;z-index:9999;
padding:15px;
}
.modal-content {
background:white;padding:30px;border-radius:12px;
width:100%;max-width:900px;
text-align:center;position:relative;
max-height:95vh;overflow-y:auto;
}
.modal-img {
max-width:100%;max-height:85vh;
object-fit:contain;border-radius:8px;
}
.modal-close {
position:fixed;top:20px;right:25px;
font-size:36px;color:#fff;
cursor:pointer;background:none;border:none;
z-index:10000;
}
.modal-download {
margin-top:15px;padding:12px 24px;
background:#28a745;color:white;
border:none;border-radius:8px;
font-size:16px;cursor:pointer;
}
.modal-btn {
margin-top:20px;padding:14px 30px;
background:#007bff;color:white;
border:none;border-radius:8px;
font-size:16px;cursor:pointer;
}
#resultModal .modal-content {
max-width:550px;padding:40px 30px;
}
#modalTitle {font-size:20px;margin-bottom:10px}
#modalMsg {font-size:15px;line-height:1.7;margin:10px 0 20px}

/* 新增：加载中样式 */
.loading {
position: fixed;
top: 50%;
left: 50%;
transform: translate(-50%, -50%);
background: rgba(0,0,0,0.7);
color: white;
padding: 20px 40px;
border-radius: 8px;
font-size: 16px;
z-index: 99999;
display: none;
}
</style>
</head>

<body>
<!-- 新增：加载中提示 -->
<div class="loading" id="loading">处理中...</div>

<div class="login" id="loginBox">
<h2>后台登录</h2>
<input type="password" id="pwd" placeholder="请输入管理密码">
<button onclick="login()">登录</button>
</div>

<div class="container" id="adminBox">
<h1>山青院订单管理</h1>
<div class="status-desc">
<span class="color-tag tag-white"></span>白色：首次提交　
<span class="color-tag tag-blue"></span>蓝色：多次提交/追加　
<span class="color-tag tag-red"></span>红色：手动修改
</div>
<div class="db-modify-desc">
1. 数据库修改班次后已自动识别标红<br>2. 首次提交白色，追加/多次提交蓝色
</div>

<div class="search-tools">
<input type="text" id="searchName" placeholder="姓名查询">
<input type="text" id="searchPhone" placeholder="电话查询">
<button onclick="searchOrders()">查询</button>
<button onclick="resetSearch()">重置</button>
</div>

<div class="tools">
<div style="display:flex;gap:8px;">
<button onclick="load()">刷新</button>
<button onclick="exportExcel()">导出Excel</button>
</div>
<button class="exit-btn" onclick="logout()">退出</button>
</div>

<div class="table-container">
<table>
<thead>
<tr>
<th class="id-col">订单ID</th>
<th class="name-col">姓名</th>
<th class="phone-col">电话</th>
<th class="paytype-col">支付方式</th>
<th class="pay-record-col">支付记录</th>
<th class="pay-screenshot-col">付款信息</th>
<th class="money-col">总金额</th>
<th class="time-col">最后提交时间</th>
<th class="class-col">4月11日早送</th>
<th class="class-col">4月11日晚接</th>
<th class="class-col">4月12日早送</th>
<th class="class-col">4月12日晚接</th>
<th class="class-col">4月11日中午</th>
<th class="class-col">4月12日中午</th>
<th class="oper-col">操作</th>
</tr>
</thead>
<tbody id="list"></tbody>
</table>
</div>
</div>

<div class="modal" id="imgModal">
<div class="modal-content">
<button class="modal-close" onclick="closeImgModal()">&times;</button>
<img class="modal-img" id="previewImg" src="">
<button class="modal-download" id="downloadBtn">下载图片</button>
</div>
</div>

<div class="modal" id="resultModal">
<div class="modal-content">
<h3 id="modalTitle">操作结果</h3>
<p id="modalMsg"></p>
<button class="modal-btn" onclick="closeModal()">确定</button>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script>
const SERVER_URL = "https://zikaocar-server.onrender.com";
let ADMIN_PWD = "";
let originalOrderData = [], mergedOrderData = [], filteredOrderData = [];

// 新增：显示/隐藏加载中
function showLoading(text = "处理中...") {
  document.getElementById('loading').innerText = text;
  document.getElementById('loading').style.display = 'block';
}
function hideLoading() {
  document.getElementById('loading').style.display = 'none';
}

// 修复：登录接口改为POST请求（密码放请求体，适配后端安全优化）
function login(){
  const val = document.getElementById('pwd').value;
  if(!val){ alert('请输入密码'); return; }
  ADMIN_PWD = val;
  checkLogin();
}

async function checkLogin(){
  showLoading("登录验证中...");
  try {
    // 修复：改为POST请求，密码放请求体
    const res = await fetch(`${SERVER_URL}/api/getAllOrders`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ pwd: ADMIN_PWD })
    });
    const d = await res.json();
    hideLoading();
    if(d.code !== 0){ 
      alert('密码错误'); 
      return; 
    }
    document.getElementById('loginBox').style.display = 'none';
    document.getElementById('adminBox').style.display = 'block';
    load();
  }catch(e){ 
    hideLoading();
    alert('登录失败：网络异常'); 
  }
}

function logout(){
  if(confirm('确定退出？')){
    ADMIN_PWD = "";
    location.reload();
  }
}

// 核心恢复：订单合并逻辑（姓名+电话一致合并为一条）
function mergeOrders(orders) {
  const mergedMap = new Map();
  
  orders.forEach(order => {
    // 以姓名+电话作为唯一标识（忽略空值）
    const key = `${order.userName || ''}_${order.userPhone || ''}`;
    if (!key) {
      // 无姓名/电话的订单单独处理
      mergedMap.set(`empty_${order._id}`, {
        ...order,
        paymentRecords: [].concat(order.paymentRecords || []),
        payScreenshots: [].concat(order.payScreenshots || []),
        isMultiSubmit: false,
        createTime: order.createTime
      });
      return;
    }

    if (mergedMap.has(key)) {
      // 已存在该用户，合并数据
      const existing = mergedMap.get(key);
      mergedMap.set(key, {
        ...existing,
        // 保留最后一次的基础信息
        orderId: existing.orderId + ',' + order.orderId, // 合并订单ID
        total: order.total || existing.total, // 保留最新金额
        createTime: order.createTime || existing.createTime, // 最后提交时间
        carList: order.carList || existing.carList, // 保留最新班次
        payType: order.payType || existing.payType, // 保留最新支付方式
        // 合并支付记录（保留所有提交记录）
        paymentRecords: [].concat(existing.paymentRecords || [], order.paymentRecords || []),
        // 合并截图
        payScreenshots: [].concat(existing.payScreenshots || [], order.payScreenshots || []),
        // 标记为多次提交
        isMultiSubmit: true,
        // 保留手动修改标记（只要有一条是修改的，就标红）
        isManuallyModified: existing.isManuallyModified || order.isManuallyModified
      });
    } else {
      // 首次出现该用户，初始化
      mergedMap.set(key, {
        ...order,
        paymentRecords: [].concat(order.paymentRecords || []),
        payScreenshots: [].concat(order.payScreenshots || []),
        isMultiSubmit: false, // 初始为单次提交
        isManuallyModified: order.isManuallyModified || false
      });
    }
  });

  // 转换为数组并返回
  return Array.from(mergedMap.values());
}

// 优化：加载订单增加加载提示，改为POST请求 + 恢复订单合并
async function load() {
  showLoading("加载订单数据中...");
  try {
    const res = await fetch(`${SERVER_URL}/api/getAllOrders`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ pwd: ADMIN_PWD })
    });
    const data = await res.json();
    hideLoading();
    if(data.code !==0) { 
      showModal('无权限','请重新登录'); 
      logout(); 
      return; 
    }
    // 保存原始数据，用于合并
    originalOrderData = data.data;
    // 合并同用户的多次提交
    mergedOrderData = mergeOrders(originalOrderData);
    // 初始化筛选数据
    filteredOrderData = [...mergedOrderData];
    renderTable();
  } catch (err) {
    hideLoading();
    showModal('错误','加载失败：网络异常');
  }
}

// 优化：图片预览兼容Base64格式，下载功能增强
function openImage(url) {
  document.getElementById('previewImg').src = url;
  document.getElementById('imgModal').style.display = 'flex';
  document.getElementById('downloadBtn').onclick = () => {
    try {
      const a = document.createElement('a');
      a.href = url;
      // 优化：生成有意义的文件名
      const timestamp = new Date().getTime();
      a.download = `支付截图_${timestamp}.png`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    } catch (e) {
      showModal('提示', '下载失败，请手动保存图片');
    }
  };
}

function closeImgModal() {
  document.getElementById('imgModal').style.display = 'none';
}

// 核心恢复：渲染表格时保留行颜色标记（蓝/红/白）+ 完整支付记录
function renderTable() {
  const list = document.getElementById('list');
  list.innerHTML = '';
  if(!filteredOrderData.length) {
    list.innerHTML = '<tr><td colspan="15">暂无数据</td></tr>';
    return;
  }
  filteredOrderData.forEach(order => {
    // 空值保护：确保order有默认值
    order = {
      orderId: '',
      userName: '',
      userPhone: '',
      payType: '',
      paymentRecords: [],
      payScreenshots: [],
      total: 0,
      createTime: '',
      carList: [],
      isManuallyModified: false,
      isMultiSubmit: false,
      _id: '',
      ...order
    };

    const tr = document.createElement('tr');
    // 恢复行颜色逻辑：手动修改(红) > 多次提交(蓝) > 首次提交(白)
    if (order.isManuallyModified) {
      tr.className = 'row-modify'; // 红色：数据库修改
    } else if (order.isMultiSubmit) {
      tr.className = 'row-multi-submit'; // 蓝色：多次提交
    } else {
      tr.className = 'row-first-submit'; // 白色：首次提交
    }

    const getClassInfo = (name) => {
      const item = order.carList.find(i => i.name === name);
      if(!item) return '-';
      if(item.school) return item.school;
      if(item.from && item.to) return `${item.from}→${item.to}`;
      return '-';
    };

    // 恢复：支付记录保留每一次提交的完整信息
    const formatPaymentRecords = () => {
      if(!order.paymentRecords?.length) return '-';
      // 按提交顺序编号，保留每一笔的完整信息
      return order.paymentRecords.map((r, i) => {
        return `第${i+1}笔：${r.payType || '未知方式'} ${r.amount || 0}元 ${r.time || '未知时间'}`;
      }).join('\n');
    };

    const renderScreenshots = () => {
      const arr = order.payScreenshots || [];
      if(!arr.length) return '<span style="color:#999">无截图</span>';
      // 优化：Base64图片预览防XSS
      return `<div class="pay-img-list">${arr.map(u=>
        `<img src="${u}" class="pay-img-item" onclick="openImage('${u.replace(/'/g, "\\'")}')" alt="支付截图">`
      ).join('')}</div>`;
    };

    tr.innerHTML = `
     <td>${order.orderId || '-'}</td>
     <td>${order.userName || '-'}</td>
     <td>${order.userPhone ? order.userPhone.replace(/(\d{3})\d{4}(\d{4})/,'$1****$2') : '-'}</td>
     <td>${order.payType || '-'}</td>
     <td class="pay-record">${formatPaymentRecords()}</td>
     <td>${renderScreenshots()}</td>
     <td>${order.total || 0}元</td>
     <td>${order.createTime || '-'}</td>
     <td>${getClassInfo('4月11日早送')}</td>
     <td>${getClassInfo('4月11日晚接')}</td>
     <td>${getClassInfo('4月12日早送')}</td>
     <td>${getClassInfo('4月12日晚接')}</td>
     <td>${getClassInfo('4月11日中午考点更换')}</td>
     <td>${getClassInfo('4月12日中午考点更换')}</td>
     <td>
       <button class="refresh-amount-btn" onclick="refreshAmount('${order.orderId}')">刷新金额</button>
       <button class="del-btn" onclick="deleteOrder('${order._id}')">删除</button>
     </td>
   `;
    list.appendChild(tr);
  });
}

// 优化：刷新金额增加加载提示，错误处理更友好
async function refreshAmount(orderId) {
  if(!confirm('确定刷新该订单的金额吗？')) return;
  showLoading("刷新金额中...");
  try {
    const r = await fetch(`${SERVER_URL}/api/recalculateAmount`,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({ pwd:ADMIN_PWD, orderId })
    });
    const d = await r.json();
    hideLoading();
    showModal('结果',d.msg);
    if(d.code===0) load();
  }catch(e){ 
    hideLoading();
    showModal('错误','刷新失败：网络异常'); 
  }
}

// 优化：删除订单增加加载提示，二次确认更清晰
async function deleteOrder(id) {
  if(!confirm('确定删除该订单吗？删除后无法恢复！')) return;
  showLoading("删除订单中...");
  try {
    const r = await fetch(`${SERVER_URL}/api/deleteOrder`,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({ pwd:ADMIN_PWD, id })
    });
    const d = await r.json();
    hideLoading();
    showModal('结果',d.msg);
    if(d.code===0) load();
  }catch(e){ 
    hideLoading();
    showModal('错误','删除失败：网络异常'); 
  }
}

// 优化：搜索功能增加模糊匹配，支持手机号部分匹配（适配合并后的订单）
function searchOrders() {
  const name = document.getElementById('searchName').value.trim().toLowerCase();
  const phone = document.getElementById('searchPhone').value.trim();
  filteredOrderData = mergedOrderData.filter(o=>{
    const nameMatch = (o.userName || '').toLowerCase().includes(name);
    const phoneMatch = (o.userPhone || '').includes(phone);
    return nameMatch && phoneMatch;
  });
  renderTable();
}

function resetSearch() {
  document.getElementById('searchName').value = '';
  document.getElementById('searchPhone').value = '';
  filteredOrderData = [...mergedOrderData];
  renderTable();
}

// 修复：导出Excel 去除付款截图链接列 + 保留合并后的支付记录
function exportExcel() {
  if(!filteredOrderData.length) { 
    showModal('提示','暂无数据可导出'); 
    return; 
  }
  showLoading("生成Excel中...");

  try {
    const excelData = filteredOrderData.map(o => {
      // 空值保护
      o = {
        orderId: '',
        userName: '',
        userPhone: '',
        payType: '',
        paymentRecords: [],
        payScreenshots: [],
        total: 0,
        createTime: '',
        carList: [],
        isMultiSubmit: false,
        isManuallyModified: false,
        ...o
      };

      const getInfo = (n) => {
        const i = o.carList.find(x => x.name === n);
        if(!i) return '-';
        if(i.school) return i.school;
        if(i.from && i.to) return i.from+'→'+i.to;
        return '-';
      };

      // 保留所有支付记录（合并后的完整提交信息）
      const payRecords = o.paymentRecords?.length
        ? o.paymentRecords.map((r,i)=>`第${i+1}笔：${r.payType || '未知方式'} ${r.amount || 0}元 ${r.time || '未知时间'}`).join('\n')
        : '-';

      return {
        '订单ID': o.orderId || '-',
        '姓名': o.userName || '-',
        '电话': o.userPhone || '-',
        '支付方式': o.payType || '-',
        '支付记录': payRecords,
        // 已删除：付款截图链接列
        '总金额': `${o.total || 0}元`,
        '提交时间': o.createTime || '-',
        '4月11日早送': getInfo('4月11日早送'),
        '4月11日晚接': getInfo('4月11日晚接'),
        '4月12日早送': getInfo('4月12日早送'),
        '4月12日晚接': getInfo('4月12日晚接'),
        '4月11日中午': getInfo('4月11日中午考点更换'),
        '4月12日中午': getInfo('4月12日中午考点更换'),
        // 新增：导出时标记订单状态（便于核对）
        '订单状态': o.isManuallyModified ? '手动修改' : (o.isMultiSubmit ? '多次提交' : '首次提交')
      };
    });

    // 生成工作表
    const ws = XLSX.utils.json_to_sheet(excelData);

    // 关键：给所有单元格设置自动换行样式
    const range = XLSX.utils.decode_range(ws['!ref'] || 'A1:A1');
    const wrapStyle = {
      alignment: {
        wrapText: true,  // 开启自动换行
        vertical: 'top',  // 顶部对齐
        horizontal: 'left' // 左对齐更易读
      }
    };
    for (let row = range.s.r; row <= range.e.r; row++) {
      for (let col = range.s.c; col <= range.e.c; col++) {
        const cellAddr = XLSX.utils.encode_cell({ r: row, c: col });
        if (ws[cellAddr]) {
          ws[cellAddr].s = wrapStyle;
        }
      }
    }

    // 调整列宽（移除付款截图链接列的宽度配置）
    ws['!cols'] = [
      {wch: 15}, // 订单ID
      {wch: 10}, // 姓名
      {wch: 15}, // 电话
      {wch: 12}, // 支付方式
      {wch: 30}, // 支付记录
      {wch: 10}, // 总金额
      {wch: 20}, // 提交时间
      {wch: 18}, // 4月11日早送
      {wch: 18}, // 4月11日晚接
      {wch: 18}, // 4月12日早送
      {wch: 18}, // 4月12日晚接
      {wch: 18}, // 4月11日中午
      {wch: 18}, // 4月12日中午
      {wch: 12}  // 订单状态
    ];

    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, '订单数据');
    
    // 优化：文件名增加时间戳，避免重复
    const dateStr = new Date().toLocaleDateString().replace(/\//g, '-');
    const timeStr = new Date().toTimeString().split(' ')[0].replace(/:/g, '-');
    XLSX.writeFile(wb, `山青院订单_${dateStr}_${timeStr}.xlsx`);
    
    hideLoading();
    showModal('成功','Excel导出完成！');
  } catch (e) {
    hideLoading();
    showModal('错误','导出失败：'+e.message);
  }
}

// 优化：弹窗显示函数增强
function showModal(t,m){
  document.getElementById('modalTitle').innerText = t;
  document.getElementById('modalMsg').innerText = m;
  document.getElementById('resultModal').style.display = 'flex';
}

function closeModal(){
  document.getElementById('resultModal').style.display = 'none';
}

    return '您确定要离开吗？未保存的操作可能丢失';
  }
});
</script>
