<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>订单管理后台</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    padding: 20px 10px; /* ✅ 缩减左右内边距，贴近页面两侧 */
    background:#f5f7fa;
    font-family:Arial;
    max-width: 100vw; /* ✅ 限制body最大宽度为视口宽度 */
    overflow-x: hidden; /* 防止页面整体横向滚动 */
  }
  .login{
    max-width:400px;
    margin:50px auto;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 2px 10px #00000010;
    width: 90%; /* ✅ 登录框适配小屏幕 */
  }
  .login input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ddd;
    border-radius:5px;
  }
  .login button{
    width:100%;
    padding:12px;
    background:#007bff;
    color:white;
    border:none;
    border-radius:5px;
  }
  .container{
    display:none;
    /* ✅ 核心优化：取消最大宽度限制，改为自适应 */
    max-width: none; 
    width: 98%; /* ✅ 占页面98%宽度，贴近两侧 */
    margin: 0 auto; /* 居中 */
    background:white;
    padding:20px 15px; /* 微调内边距 */
    border-radius:10px;
    box-shadow:0 2px 10px #00000010;
  }
  h1{
    margin-bottom:20px;
    text-align:center;
    font-size: 20px; /* 微调标题大小，更协调 */
  }
  .tools{
    display:flex;
    gap:10px;
    margin-bottom:15px;
    align-items:center;
    justify-content:space-between;
    flex-wrap: wrap; /* 小屏幕工具条换行 */
  }
  .tools-right{
    display:flex;
    gap:10px;
  }
  button{
    padding:8px 16px;
    background:#007bff;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
  }
  button.del-btn{background:#dc3545}
  button.exit-btn{background:#6c757d}
  
  /* ✅ 核心优化：表格容器（加宽+贴近两侧） */
  .table-container{
    overflow-x: auto; /* 横向滚动 */
    margin: 10px 0;
    border-radius: 5px;
    box-shadow: 0 1px 3px #00000010;
    width: 100%; /* ✅ 容器占满父级宽度 */
  }
  table{
    width: 100%;
    min-width: 900px; /* ✅ 降低最小宽度，适配更窄屏幕 */
    border-collapse: collapse;
  }
  th,td{
    border:1px solid #ddd;
    padding: 8px 6px; /* 保持内边距 */
    text-align: center;
    white-space: nowrap;
  }
  th{
    background:#f8f9fa;
    font-size: 14px;
  }
  td{
    font-size: 13px;
  }
  /* 列宽保持不变，仅调整容器宽度 */
  .id-col{width: 80px !important;}
  .time-col{width: 150px !important;}
  .name-col{width: 80px !important;}
  .money-col{width: 80px !important;}
  .oper-col{width: 80px !important;}
  .class-col{width: 120px !important;}
  .empty-cell{color: #999;}

  /* ✅ 响应式优化：小屏幕适配 */
  @media (max-width: 768px) {
    .container{
      width: 99%; /* 手机端更贴近两侧 */
      padding: 15px 10px;
    }
    .tools{
      flex-direction: column;
      align-items: flex-start;
    }
    .tools-right{
      margin-top: 10px;
      width: 100%;
      justify-content: flex-end;
    }
  }
</style>
</head>
<body>

<!-- 登录界面 -->
<div class="login" id="loginBox">
  <h2>后台登录</h2>
  <input type="password" id="pwd" placeholder="请输入管理密码">
  <button onclick="login()">登录</button>
</div>

<!-- 管理界面 -->
<div class="container" id="adminBox">
  <h1>订单管理</h1>
  <div class="tools">
    <div class="tools-left">
      <button onclick="load()">刷新</button>
      <button onclick="exportExcel()">导出 Excel</button>
    </div>
    <div class="tools-right">
      <button class="exit-btn" onclick="logout()">退出登录</button>
    </div>
  </div>
  
  <!-- 表格容器 -->
  <div class="table-container">
    <table>
      <thead>
        <tr>
          <th class="id-col">订单ID</th>
          <th class="name-col">姓名</th>
          <th class="money-col">金额(元)</th>
          <th class="time-col">提交时间</th>
          <th class="class-col">4月11日早送</th>
          <th class="class-col">4月11日晚接</th>
          <th class="class-col">4月12日早送</th>
          <th class="class-col">4月12日晚接</th>
          <th class="class-col">4月11日中午考点更换</th>
          <th class="class-col">4月12日中午考点更换</th>
          <th class="oper-col">操作</th>
        </tr>
      </thead>
      <tbody id="list"></tbody>
    </table>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script>
// 替换为你的Render后端地址
const SERVER_URL = "https://zikaocar-server.onrender.com";
const PWD = "sutong5560";

let orderData = [];

// 登录
function login(){
  const val = document.getElementById('pwd').value;
  if(val !== PWD){alert('密码错误');return}
  document.getElementById('loginBox').style.display = 'none';
  document.getElementById('adminBox').style.display = 'block';
  load();
}

// 退出登录
function logout(){
  if(confirm('确定要退出登录吗？')){
    document.getElementById('loginBox').style.display = 'block';
    document.getElementById('adminBox').style.display = 'none';
    document.getElementById('pwd').value = '';
    orderData = [];
  }
}

// 解析班次数据
function parseClassData(carList) {
  const classMap = {
    "4月11日早送": "-",
    "4月11日晚接": "-",
    "4月12日早送": "-",
    "4月12日晚接": "-",
    "4月11日中午考点更换": "-",
    "4月12日中午考点更换": "-"
  };

  carList.forEach(item => {
    const className = item.name;
    let content = "-";
    if(item.school) {
      content = item.school;
    } else if(item.from && item.to) {
      content = `${item.from}→${item.to}`;
    }
    if(classMap.hasOwnProperty(className)) {
      classMap[className] = content;
    }
  });

  return classMap;
}

// 加载订单
function load(){
  const url = `${SERVER_URL}/api/getAllOrders?pwd=${encodeURIComponent(PWD)}`;
  
  fetch(url)
  .then(res=>{
    if(!res.ok) throw new Error(`接口请求失败：${res.status}`);
    return res.json();
  })
  .then(res=>{
    if(res.code===0){
      orderData = res.data;
      let html = '';
      res.data.forEach(item=>{
        const classData = parseClassData(item.carList || []);
        html += `
          <tr data-order-id="${item.id}">
            <td class="id-col">${item.orderId || item.id || '-'}</td>
            <td class="name-col">${item.userName || '-'}</td>
            <td class="money-col">${item.total || 0}</td>
            <td class="time-col">${item.createTime || '-'}</td>
            <td class="class-col ${classData['4月11日早送'] === '-' ? 'empty-cell' : ''}">${classData['4月11日早送']}</td>
            <td class="class-col ${classData['4月11日晚接'] === '-' ? 'empty-cell' : ''}">${classData['4月11日晚接']}</td>
            <td class="class-col ${classData['4月12日早送'] === '-' ? 'empty-cell' : ''}">${classData['4月12日早送']}</td>
            <td class="class-col ${classData['4月12日晚接'] === '-' ? 'empty-cell' : ''}">${classData['4月12日晚接']}</td>
            <td class="class-col ${classData['4月11日中午考点更换'] === '-' ? 'empty-cell' : ''}">${classData['4月11日中午考点更换']}</td>
            <td class="class-col ${classData['4月12日中午考点更换'] === '-' ? 'empty-cell' : ''}">${classData['4月12日中午考点更换']}</td>
            <td class="oper-col"><button class="del-btn" onclick="deleteOrder('${item.id}')">删除</button></td>
          </tr>
        `;
      });
      document.getElementById('list').innerHTML = html || '<tr><td colspan="11" style="text-align:center;color:#999">暂无订单数据</td></tr>';
    }else if(res.code===-2){
      alert('密码错误，请重新登录');
      logout();
    }else{
      alert(`加载失败：${res.msg || '未知错误'}`);
    }
  }).catch(err=>{
    console.error('加载订单失败：', err);
    alert(`加载订单失败：${err.message || '请检查后端服务是否正常'}`);
  });
}

// 删除订单
function deleteOrder(orderId){
  if(!orderId || !confirm(`确定要删除订单【${orderId}】吗？此操作不可恢复！`)){
    return;
  }

  fetch(`${SERVER_URL}/api/deleteOrder`, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
    },
    body: JSON.stringify({ 
      pwd: PWD,
      id: orderId
    })
  })
  .then(res=>{
    if(!res.ok) throw new Error(`删除请求失败：${res.status}`);
    return res.json();
  })
  .then(res=>{
    if(res.code===0){
      alert('删除成功！');
      load();
    }else if(res.code===-2){
      alert('密码错误，删除失败');
      logout();
    }else{
      alert(`删除失败：${res.msg || '订单不存在'}`);
    }
  })
  .catch(err=>{
    console.error('删除订单失败：', err);
    alert(`删除失败：${err.message || '请检查后端接口是否正常'}`);
  });
}

// 导出Excel
function exportExcel(){
  if(orderData.length === 0){
    alert('暂无订单数据可导出');
    return;
  }
  const header = [
    '订单ID', '姓名', '金额(元)', '提交时间',
    '4月11日早送', '4月11日晚接', '4月12日早送',
    '4月12日晚接', '4月11日中午考点更换',
    '4月12日中午考点更换', '操作'
  ];
  const data = [header];
  
  orderData.forEach(item=>{
    const classData = parseClassData(item.carList || []);
    data.push([
      item.orderId || item.id || '-',
      item.userName || '-',
      item.total || 0,
      item.createTime || '-',
      classData['4月11日早送'],
      classData['4月11日晚接'],
      classData['4月12日早送'],
      classData['4月12日晚接'],
      classData['4月11日中午考点更换'],
      classData['4月12日中午考点更换'],
      '已删除/正常'
    ]);
  });
  
  const ws = XLSX.utils.aoa_to_sheet(data);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "订单列表");
  XLSX.writeFile(wb, `订单列表_${new Date().toLocaleDateString()}.xlsx`);
}
</script>
</body>
</html>
