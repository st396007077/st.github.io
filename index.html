<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>报名系统</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
  body{padding:20px;background:#f5f5f5}
  .container{max-width:600px;margin:0 auto;background:white;padding:20px;border-radius:10px}
  .title{text-align:center;margin-bottom:20px}
  .user-info{margin-bottom:15px}
  input{width:100%;padding:10px;margin-top:5px;border:1px solid #ddd;border-radius:5px}
  .car-item{border:1px solid #ddd;padding:12px;margin-bottom:10px;border-radius:5px}
  .btn{background:#007bff;color:white;padding:12px;width:100%;border:none;border-radius:5px;margin-top:20px;font-size:16px}
  .modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);display:none;align-items:center;justify-content:center}
  .modal-content{background:white;padding:20px;border-radius:10px;width:90%;max-width:400px}
  .close{margin-top:15px;padding:8px 16px;background:#ddd;border:none;border-radius:5px}
</style>
</head>
<body>
<div class="container">
  <h2 class="title">自考专车报名</h2>
  <div class="user-info">
    <label>乘车人姓名</label>
    <input type="text" id="userName" placeholder="请输入姓名">
  </div>

  <div class="car-list">
    <div class="car-item">
      <label><input type="checkbox" class="car-check" data-type="1" data-name="考场专线-去程" value="50"> 考场专线-去程 50元</label>
      <div id="school1" style="margin-top:8px">
        <select>
          <option>未选择</option>
          <option>学校A</option>
          <option>学校B</option>
        </select>
      </div>
    </div>
  </div>

  <button class="btn" onclick="pay()">提交并支付</button>
</div>

<!-- 支付弹窗 -->
<div class="modal" id="qrModal">
  <div class="modal-content">
    <h3>请完成支付</h3>
    <img src="https://picsum.photos/300/300" style="width:100%;margin:10px 0">
    <button class="close" onclick="paySuccess()">已支付</button>
  </div>
</div>

<!-- 成功弹窗 -->
<div class="modal" id="successModal">
  <div class="modal-content">
    <h3>提交成功</h3>
    <div id="successInfo"></div>
    <button class="close" onclick="closeSuccess()">关闭</button>
  </div>
</div>

<script>
// ==============================================
// 👉 【必须修改】把这里换成你的服务器地址
// ==============================================
const SERVER_URL = "http://localhost:3000";

function pay(){
  const name = document.getElementById('userName').value;
  if(!name){alert('请输入姓名');return}
  document.getElementById('qrModal').style.display = 'flex';
}

function closeSuccess(){
  document.getElementById('successModal').style.display = 'none';
}

function calcTotal(){
  let total = 0;
  document.querySelectorAll('.car-check:checked').forEach(i=>{total+=parseInt(i.value)})
  return total;
}

// 提交到后端
function paySuccess() {
  document.getElementById('qrModal').style.display = 'none';
  const name = document.getElementById('userName').value.trim();
  const total = calcTotal();
  let userCarList = [];

  document.querySelectorAll('.car-check:checked').forEach(item => {
    const type = item.dataset.type;
    const carName = item.dataset.name;
    const price = item.value;
    const schoolBox = document.getElementById(`school${type}`);
    const selects = schoolBox.querySelectorAll('select');
    let carInfo = { name: carName, price: price };
    if(selects.length === 1) carInfo.school = selects[0].value;
    userCarList.push(carInfo);
  });

  fetch(SERVER_URL + '/api/submitOrder', {
    method: 'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({ userName:name, total, carList:userCarList })
  }).then(res=>res.json()).then(data=>{
    if(data.code===0){
      let info = `
        乘车人：${name}<br>
        总费用：${total} 元<br>
        订单ID：${data.orderId}<br>
      `;
      document.getElementById('successInfo').innerHTML = info;
      document.getElementById('successModal').style.display = 'flex';
    }else{
      alert('提交失败');
    }
  }).catch(()=>alert('网络错误'));
}
</script>
</body>
</html>
