<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>乘车订单提交</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial;background:#f6f8fa;padding:15px;line-height:1.5}
.container{max-width:700px;margin:0 auto;background:#fff;border-radius:12px;padding:20px;box-shadow:0 2px10px #0000000b}
h2{text-align:center;margin-bottom:20px;font-size:20px}
.section{margin-bottom:18px}
label{display:block;margin-bottom:6px;font-weight:bold}
input{width:100%;padding:12px;border:1px solid #ddd;border-radius:8px;font-size:14px}
.vehicle-item{display:flex;align-items:center;gap:10px;margin-bottom:10px;padding:10px;border-radius:8px;border:1px solid #eee}
.school-select{margin-top:6px;display:flex;gap:8px}
select{padding:8px;border-radius:6px;border:1px solid #ddd}
.pay-type{display:flex;gap:12px;margin:10px 0}
.pay-btn{padding:10px 14px;border:1px solid #007bff;border-radius:8px;background:none;cursor:pointer}
.pay-btn.active{background:#007bff;color:#fff}
.upload-box{border:2px dashed #ccc;border-radius:8px;padding:25px;text-align:center;cursor:pointer;margin:10px 0}
#screenshotPreview{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.screenshot-img{width:80px;height:80px;object-fit:cover;border-radius:6px}
.total-price{font-size:18px;font-weight:bold;color:#dc3545;margin:15px 0}
.submit-btn{width:100%;padding:14px;background:#007bff;color:white;border:none;border-radius:8px;font-size:16px;font-weight:bold}
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);display:none;justify-content:center;align-items:center;padding:15px;z-index:9999}
.modal-content{background:#fff;border-radius:12px;padding:25px;max-width:550px;width:100%;max-height:90vh;overflow-y:auto}
.modal-content img{max-width:100%;border-radius:8px;margin:10px 0}
.modal-btns{display:flex;justify-content:flex-end;gap:10px;margin-top:15px}
.modal-btns button{padding:10px 16px;border-radius:8px;border:none}
.btn-cancel{background:#ccc}
.btn-confirm{background:#007bff;color:#fff}
#successInfo{line-height:1.8;margin:10px 0}
</style>
</head>
<body>
<div class="container">
  <h2>订单提交</h2>

  <div class="section">
    <label>姓名</label>
    <input type="text" id="userName" placeholder="请输入姓名">
  </div>
  <div class="section">
    <label>电话</label>
    <input type="text" id="userPhone" placeholder="请输入手机号">
  </div>

  <div class="section">
    <label>选择班次</label>
    <div class="vehicle-item">
      <input type="checkbox" class="car-check" data-type="1" data-name="4月11日早送" value="20">
      <span>4月11日早送 20元</span>
      <div class="school-select" id="school1">
        <select><option value="学校A">学校A</option><option value="学校B">学校B</option></select>
      </div>
    </div>
    <div class="vehicle-item">
      <input type="checkbox" class="car-check" data-type="2" data-name="4月11日晚接" value="20">
      <span>4月11日晚接 20元</span>
      <div class="school-select" id="school2">
        <select><option value="学校A">学校A</option><option value="学校B">学校B</option></select>
      </div>
    </div>
    <div class="vehicle-item">
      <input type="checkbox" class="car-check" data-type="3" data-name="4月12日早送" value="20">
      <span>4月12日早送 20元</span>
      <div class="school-select" id="school3">
        <select><option value="学校A">学校A</option><option value="学校B">学校B</option></select>
      </div>
    </div>
    <div class="vehicle-item">
      <input type="checkbox" class="car-check" data-type="4" data-name="4月12日晚接" value="20">
      <span>4月12日晚接 20元</span>
      <div class="school-select" id="school4">
        <select><option value="学校A">学校A</option><option value="学校B">学校B</option></select>
      </div>
    </div>
  </div>

  <div class="section">
    <label>支付方式</label>
    <div class="pay-type">
      <button class="pay-btn" data-type="微信">微信支付</button>
      <button class="pay-btn" data-type="支付宝">支付宝</button>
    </div>
  </div>

  <div class="section">
    <label>上传支付截图</label>
    <div class="upload-box" onclick="document.getElementById('screenshotInput').click()">
      点击上传截图（支持png/jpg/webp）
    </div>
    <input type="file" id="screenshotInput" multiple accept="image/*" style="display:none">
    <div id="screenshotPreview"></div>
  </div>

  <div class="total-price">合计：<span id="totalPrice">0</span> 元</div>
  <button class="submit-btn" onclick="showScreenshotModal()">确认提交</button>
</div>

<!-- 截图确认弹窗 -->
<div class="modal" id="screenshotModal">
  <div class="modal-content">
    <h3>确认提交订单？</h3>
    <div id="previewList"></div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeScreenshotModal()">取消</button>
      <button class="btn-confirm" onclick="submitOrderSecure()">确认提交</button>
    </div>
  </div>
</div>

<!-- 成功弹窗 -->
<div class="modal" id="successModal">
  <div class="modal-content">
    <h3>提交成功</h3>
    <div id="successInfo"></div>
    <div class="modal-btns">
      <button class="btn-confirm" onclick="location.reload()">完成</button>
    </div>
  </div>
</div>

<script>
const SERVER_URL = "https://zikaocar-server.onrender.com";
let screenshotFiles = [];
let selectedPayType = "";
let isSubmitting = false; // 防重复提交锁

// 支付方式选择
document.querySelectorAll('.pay-btn').forEach(b => {
  b.onclick = () => {
    document.querySelectorAll('.pay-btn').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    selectedPayType = b.dataset.type;
  }
});

// 截图预览
document.getElementById('screenshotInput').onchange = function(e) {
  const files = Array.from(e.target.files);
  screenshotFiles = [];
  document.getElementById('screenshotPreview').innerHTML = '';

  for (const f of files) {
    // 安全校验：只允许图片
    if (!f.type.startsWith('image/')) {
      alert('仅支持图片文件');
      continue;
    }
    // 限制10M
    if (f.size > 10 * 1024 * 1024) {
      alert('文件不能超过10M');
      continue;
    }
    screenshotFiles.push(f);
    const img = document.createElement('img');
    img.className = 'screenshot-img';
    img.src = URL.createObjectURL(f);
    document.getElementById('screenshotPreview').appendChild(img);
  }
};

// 计算价格
function calcTotal() {
  return Array.from(document.querySelectorAll('.car-check:checked'))
    .reduce((s, i) => s + Number(i.value), 0);
}

document.querySelectorAll('.car-check').forEach(c => {
  c.onchange = () => document.getElementById('totalPrice').textContent = calcTotal();
});

// 打开确认弹窗
function showScreenshotModal() {
  const name = document.getElementById('userName').value.trim();
  const phone = document.getElementById('userPhone').value.trim();
  if (!name || !phone) return alert('请填写姓名和电话');
  if (!selectedPayType) return alert('请选择支付方式');
  if (screenshotFiles.length === 0) return alert('请上传截图');
  if (calcTotal() <= 0) return alert('请选择班次');

  const previewList = document.getElementById('previewList');
  previewList.innerHTML = '';
  screenshotFiles.forEach((f, i) => {
    const div = document.createElement('div');
    const img = document.createElement('img');
    img.style.maxWidth = '100%';
    img.src = URL.createObjectURL(f);
    div.appendChild(img);
    previewList.appendChild(div);
  });

  document.getElementById('screenshotModal').style.display = 'flex';
}

function closeScreenshotModal() {
  document.getElementById('screenshotModal').style.display = 'none';
}

// ============================
// ✅ 安全加固版：提交函数
// ============================
async function submitOrderSecure() {
  if (isSubmitting) return; // 防重复提交
  isSubmitting = true;

  try {
    const name = document.getElementById('userName').value.trim();
    const phone = document.getElementById('userPhone').value.trim();
    const total = calcTotal();

    // 安全输入过滤
    if (!/^[\u4e00-\u9fa5a-zA-Z]{2,8}$/.test(name)) {
      alert('请输入正确姓名');
      isSubmitting = false;
      return;
    }
    if (!/^1[3-9]\d{9}$/.test(phone)) {
      alert('请输入正确手机号');
      isSubmitting = false;
      return;
    }

    // 构造班次数据
    const carList = [];
    document.querySelectorAll('.car-check:checked').forEach(el => {
      const type = el.dataset.type;
      const name = el.dataset.name;
      const price = el.value;
      const sels = document.getElementById(`school${type}`)?.querySelectorAll('select');
      let item = { name, price };
      if (sels?.length === 1) item.school = sels[0].value.trim();
      if (sels?.length === 2) item.from = sels[0].value.trim(), item.to = sels[1].value.trim();
      carList.push(item);
    });

    // 1. 创建订单
    const orderRes = await fetch(SERVER_URL + "/api/submitOrder", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        userName: name,
        userPhone: phone,
        payType: selectedPayType,
        carList,
        total,
        createTime: new Date().toLocaleString()
      })
    });

    const orderData = await orderRes.json();
    if (orderData.code !== 0) {
      alert('提交失败：' + (orderData.msg || '系统异常'));
      isSubmitting = false;
      return;
    }

    // 2. 上传截图
    const form = new FormData();
    form.append('orderId', orderData.orderId);
    screenshotFiles.forEach(f => form.append('screenshots', f));

    const uploadRes = await fetch(SERVER_URL + "/api/uploadScreenshot", {
      method: "POST",
      body: form
    });

    const uploadData = await uploadRes.json();
    if (uploadData.code !== 0) {
      // 回滚：上传失败删除订单
      await fetch(`${SERVER_URL}/api/deleteOrder?orderId=${orderData.orderId}`, {
        method: "DELETE"
      });
      alert('截图上传失败，已自动撤销订单');
      isSubmitting = false;
      return;
    }

    // 成功
    closeScreenshotModal();
    document.getElementById('successModal').style.display = 'flex';

  } catch (err) {
    console.error(err);
    alert('提交失败：网络异常或文件格式错误');
  } finally {
    isSubmitting = false;
  }
}
</script>
</body>
</html>
