<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>订单管理后台</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{padding:20px;background:#f5f7fa;font-family:Arial}
  .login{max-width:400px;margin:50px auto;background:white;padding:30px;border-radius:10px;box-shadow:0 2px 10px #00000010}
  .login input{width:100%;padding:12px;margin:10px 0;border:1px solid #ddd;border-radius:5px}
  .login button{width:100%;padding:12px;background:#007bff;color:white;border:none;border-radius:5px}
  .container{display:none;max-width:900px;margin:0 auto;background:white;padding:20px;border-radius:10px}
  h1{margin-bottom:20px;text-align:center}
  .tools{display:flex;gap:10px;margin-bottom:15px;align-items:center;justify-content:space-between}
  .tools-right{display:flex;gap:10px}
  button{padding:8px 16px;background:#007bff;color:white;border:none;border-radius:5px;cursor:pointer}
  button.del-btn{background:#dc3545}
  button.exit-btn{background:#6c757d}
  table{width:100%;border-collapse:collapse}
  th,td{border:1px solid #ddd;padding:10px;text-align:left}
  th{background:#f8f9fa}
  /* 详情换行优化 */
  .detail-cell{max-width:200px;word-break:break-all}
</style>
</head>
<body>

<!-- 登录界面 -->
<div class="login" id="loginBox">
  <h2>后台登录</h2>
  <input type="password" id="pwd" placeholder="请输入管理密码">
  <button onclick="login()">登录</button>
</div>

<!-- 管理界面 -->
<div class="container" id="adminBox">
  <h1>订单管理</h1>
  <div class="tools">
    <div class="tools-left">
      <button onclick="load()">刷新</button>
      <button onclick="exportExcel()">导出 Excel</button>
    </div>
    <div class="tools-right">
      <button class="exit-btn" onclick="logout()">退出登录</button>
    </div>
  </div>
  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>姓名</th>
        <th>金额</th>
        <th>时间</th>
        <th>详情</th>
        <th>操作</th> <!-- 新增操作列 -->
      </tr>
    </thead>
    <tbody id="list"></tbody>
  </table>
</div>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script>
// ==============================================
// 👉 【必须修改】服务器地址 + 后台密码
// ==============================================
const SERVER_URL = "https://zikaocar-server.onrender.com";
const PWD = "sutong5560";

let orderData = [];

// 登录
function login(){
  const val = document.getElementById('pwd').value;
  if(val !== PWD){alert('密码错误');return}
  document.getElementById('loginBox').style.display = 'none';
  document.getElementById('adminBox').style.display = 'block';
  load();
}

// 退出登录（新增）
function logout(){
  if(confirm('确定要退出登录吗？')){
    // 重置界面状态
    document.getElementById('loginBox').style.display = 'block';
    document.getElementById('adminBox').style.display = 'none';
    document.getElementById('pwd').value = ''; // 清空密码框
    orderData = []; // 清空订单数据
  }
}

// 加载订单
function load(){
  fetch(SERVER_URL + `/api/getAllOrders?pwd=${PWD}`)
  .then(res=>res.json()).then(res=>{
    if(res.code===0){
      orderData = res.data;
      const html = res.data.map(item=>`
        <tr>
          <td>${item.id}</td>
          <td>${item.userName}</td>
          <td>${item.total}</td>
          <td>${item.createTime}</td>
          <!-- 优化详情显示：包含班次+学校信息 -->
          <td class="detail-cell">${item.carList.map(i=>`${i.name}（班次：${i.class || '无'}，学校：${i.school || '无'}）`).join('，')}</td>
          <!-- 新增删除按钮 -->
          <td><button class="del-btn" onclick="deleteOrder(${item.id})">删除</button></td>
        </tr>
      `).join('');
      document.getElementById('list').innerHTML = html;
    }else if(res.code===-2){
      alert('密码错误');
      location.reload();
    }
  }).catch(err=>{
    console.error('加载订单失败：', err);
    alert('加载订单失败，请检查服务器连接');
  });
}

// 删除订单（新增）
function deleteOrder(orderId){
  if(!confirm(`确定要删除ID为 ${orderId} 的订单吗？此操作不可恢复！`)){
    return;
  }

  // 发送删除请求到服务器
  fetch(`${SERVER_URL}/api/deleteOrder?pwd=${PWD}`, {
    method: 'POST', // 建议用POST，也可根据后端接口调整为DELETE
    headers: {
      'Content-Type': 'application/json',
    },
    body: JSON.stringify({ id: orderId })
  })
  .then(res=>res.json())
  .then(res=>{
    if(res.code===0){
      alert('删除成功！');
      load(); // 重新加载订单列表
    }else{
      alert(`删除失败：${res.msg || '未知错误'}`);
    }
  })
  .catch(err=>{
    console.error('删除订单失败：', err);
    alert('删除订单失败，请检查服务器连接');
  });
}

// 导出 Excel（优化详情导出）
function exportExcel(){
  const data = [['ID','姓名','总金额','提交时间','详情','操作']];
  orderData.forEach(item=>{
    data.push([
      item.id,
      item.userName,
      item.total,
      item.createTime,
      // 导出时也包含班次和学校信息
      item.carList.map(i=>`${i.name}（班次：${i.class || '无'}，学校：${i.school || '无'}）`).join(' | '),
      '删除操作' // Excel中标记操作列含义
    ]);
  });
  const ws = XLSX.utils.aoa_to_sheet(data);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "订单");
  XLSX.writeFile(wb, "订单列表.xlsx");
}
</script>
</body>
</html>
