<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>订单管理后台</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    padding: 20px 10px;
    background:#f5f7fa;
    font-family:Arial;
    max-width: 100vw;
    overflow-x: hidden;
  }
  .login{
    max-width:400px;
    margin:50px auto;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 2px 10px #00000010;
    width: 90%;
  }
  .login input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ddd;
    border-radius:5px;
  }
  .login button{
    width:100%;
    padding:12px;
    background:#007bff;
    color:white;
    border:none;
    border-radius:5px;
  }
  .container{
    display:none;
    max-width: none;
    width: 98%;
    margin: 0 auto;
    background:white;
    padding:20px 15px;
    border-radius:10px;
    box-shadow:0 2px 10px #00000010;
  }
  h1{
    margin-bottom:10px;
    text-align:center;
    font-size: 20px;
  }
  /* 颜色说明样式 */
  .color-desc{
    margin-bottom:15px;
    padding:8px 10px;
    background:#f8f9fa;
    border-radius:5px;
    font-size:13px;
    color:#666;
  }
  .color-desc span{
    display:inline-block;
    margin-right:15px;
  }
  .color-desc span i{
    display:inline-block;
    width:12px;
    height:12px;
    border-radius:2px;
    margin-right:5px;
    vertical-align:middle;
  }
  .color-normal i{background:white;border:1px solid #ddd;}
  .color-modified i{background:#cce5ff;}
  .color-multi i{background:#d4edda;}
  .color-repeat i{background:#f8d7da;}

  /* 查询工具样式 */
  .search-tools{
    display:flex;
    gap:10px;
    margin-bottom:15px;
    flex-wrap:wrap;
    align-items:center;
  }
  .search-tools input{
    padding:8px 10px;
    border:1px solid #ddd;
    border-radius:5px;
    width:200px;
  }
  .search-tools button{
    padding:8px 16px;
    background:#007bff;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
  }

  .tools{
    display:flex;
    gap:10px;
    margin-bottom:15px;
    align-items:center;
    justify-content:space-between;
    flex-wrap: wrap;
  }
  .tools-right{
    display:flex;
    gap:10px;
  }
  button{
    padding:8px 16px;
    background:#007bff;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
  }
  button.del-btn{background:#dc3545}
  button.edit-btn{background:#28a745}
  button.exit-btn{background:#6c757d}
  
  .table-container{
    overflow-x: auto;
    margin: 10px 0;
    border-radius: 5px;
    box-shadow: 0 1px 3px #00000010;
    width: 100%;
  }
  table{
    width: 100%;
    min-width: 1200px;
    border-collapse: collapse;
  }
  th,td{
    border:1px solid #ddd;
    padding: 8px 6px;
    text-align: center;
    white-space: nowrap;
  }
  th{
    background:#f8f9fa;
    font-size: 14px;
  }
  td{
    font-size: 13px;
  }
  .id-col{width: 80px !important;}
  .time-col{width: 150px !important;}
  .name-col{width: 80px !important;}
  .phone-col{width: 110px !important;}
  .paytype-col{width: 100px !important;}
  .money-col{width: 80px !important;}
  .oper-col{width: 120px !important;} /* 加宽操作列 */
  .class-col{width: 120px !important;}
  .remark-col{width: 150px !important;} /* 备注列宽度 */
  .empty-cell{color: #999;}

  /* 行颜色样式 */
  .row-modified{background-color: #cce5ff !important;} /* 蓝色：修改过 */
  .row-multi{background-color: #d4edda !important;} /* 绿色：多次提交 */
  .row-repeat{background-color: #f8d7da !important;} /* 红色：重复班次 */

  /* 弹窗样式 */
  .modal{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.5);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:9999;
  }
  .modal-content{
    background:white;
    padding:20px;
    border-radius:8px;
    width:90%;
    max-width:800px;
    max-height:90vh;
    overflow-y:auto;
  }
  .modal-title{
    font-size:16px;
    font-weight:bold;
    margin-bottom:15px;
    padding-bottom:10px;
    border-bottom:1px solid #eee;
  }
  .form-group{
    margin-bottom:15px;
  }
  .form-group label{
    display:block;
    margin-bottom:5px;
    font-size:14px;
    font-weight:500;
  }
  .form-group input, .form-group select{
    width:100%;
    padding:8px 10px;
    border:1px solid #ddd;
    border-radius:5px;
    font-size:14px;
  }
  .class-editor{
    border:1px solid #ddd;
    border-radius:5px;
    padding:10px;
    margin-bottom:15px;
  }
  .class-item{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:8px;
    padding:8px;
    background:#f8f9fa;
    border-radius:4px;
  }
  .class-item select{
    flex:1;
    padding:6px;
  }
  .class-item button{
    padding:6px 10px;
    background:#dc3545;
    font-size:12px;
  }
  .add-class-btn{
    padding:6px 10px;
    background:#28a745;
    font-size:12px;
    margin-bottom:10px;
  }
  .modal-footer{
    display:flex;
    gap:10px;
    justify-content:flex-end;
    margin-top:20px;
  }
  .modal-footer button{
    padding:8px 20px;
  }
  .cancel-btn{
    background:#6c757d;
  }

  @media (max-width: 768px) {
    .container{
      width: 99%;
      padding: 15px 10px;
    }
    .tools, .search-tools{
      flex-direction: column;
      align-items: flex-start;
    }
    .tools-right, .search-tools button{
      margin-top: 10px;
      width: 100%;
      justify-content: flex-end;
    }
    .search-tools input{
      width: 100%;
    }
  }
</style>
</head>
<body>

<!-- 登录界面 -->
<div class="login" id="loginBox">
  <h2>后台登录</h2>
  <input type="password" id="pwd" placeholder="请输入管理密码">
  <button onclick="login()">登录</button>
</div>

<!-- 管理界面 -->
<div class="container" id="adminBox">
  <h1>订单管理</h1>
  <!-- 颜色说明 -->
  <div class="color-desc">
    <span class="color-normal"><i></i>白色：正常</span>
    <span class="color-modified"><i></i>蓝色：修改过</span>
    <span class="color-multi"><i></i>绿色：多次提交</span>
    <span class="color-repeat"><i></i>红色：重复提交同一班次</span>
  </div>
  
  <!-- 查询工具 -->
  <div class="search-tools">
    <input type="text" id="searchName" placeholder="请输入姓名查询">
    <input type="text" id="searchPhone" placeholder="请输入联系电话查询">
    <button onclick="searchOrders()">查询</button>
    <button onclick="resetSearch()">重置</button>
  </div>

  <div class="tools">
    <div class="tools-left">
      <button onclick="load()">刷新</button>
      <button onclick="exportExcel()">导出 Excel</button>
    </div>
    <div class="tools-right">
      <button class="exit-btn" onclick="logout()">退出登录</button>
    </div>
  </div>
  
  <!-- 表格容器 -->
  <div class="table-container">
    <table>
      <thead>
        <tr>
          <th class="id-col">订单ID</th>
          <th class="name-col">姓名</th>
          <th class="phone-col">联系电话</th>
          <th class="paytype-col">支付方式</th>
          <th class="money-col">金额(元)</th>
          <th class="time-col">提交时间</th>
          <th class="class-col">4月11日早送</th>
          <th class="class-col">4月11日晚接</th>
          <th class="class-col">4月12日早送</th>
          <th class="class-col">4月12日晚接</th>
          <th class="class-col">4月11日中午考点更换</th>
          <th class="class-col">4月12日中午考点更换</th>
          <th class="remark-col">备注</th> <!-- 新增备注列 -->
          <th class="oper-col">操作</th>
        </tr>
      </thead>
      <tbody id="list"></tbody>
    </table>
  </div>
</div>

<!-- 修改弹窗 -->
<div class="modal" id="editModal">
  <div class="modal-content">
    <div class="modal-title">修改订单信息</div>
    <input type="hidden" id="editOrderId">
    <div class="form-group">
      <label>姓名</label>
      <input type="text" id="editName" placeholder="请输入姓名">
    </div>
    <div class="form-group">
      <label>联系电话</label>
      <input type="text" id="editPhone" placeholder="请输入联系电话">
    </div>
    <div class="form-group">
      <label>乘坐班次</label>
      <div class="class-editor">
        <button class="add-class-btn" onclick="addClassItem()">添加班次</button>
        <div id="classItemsContainer"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="cancel-btn" onclick="closeEditModal()">取消</button>
      <button onclick="saveEditOrder()">确定</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script>
// 替换为你的Render后端地址
const SERVER_URL = "https://zikaocar-server.onrender.com";
const PWD = "sutong5560";

let orderData = []; // 原始订单数据
let filteredOrderData = []; // 筛选后的订单数据
// 班次列表
const classTypes = [
  "4月11日早送",
  "4月11日晚接",
  "4月12日早送",
  "4月12日晚接",
  "4月11日中午考点更换",
  "4月12日中午考点更换"
];
// 示例学校列表（可根据实际需求修改）
const schoolList = [
  "学校A", "学校B", "学校C", "学校D", "学校E"
];

// 登录
function login(){
  const val = document.getElementById('pwd').value;
  if(val !== PWD){alert('密码错误');return}
  document.getElementById('loginBox').style.display = 'none';
  document.getElementById('adminBox').style.display = 'block';
  load();
}

// 退出登录
function logout(){
  if(confirm('确定要退出登录吗？')){
    document.getElementById('loginBox').style.display = 'block';
    document.getElementById('adminBox').style.display = 'none';
    document.getElementById('pwd').value = '';
    orderData = [];
    filteredOrderData = [];
  }
}

// 解析班次数据
function parseClassData(carList) {
  const classMap = {
    "4月11日早送": "-",
    "4月11日晚接": "-",
    "4月12日早送": "-",
    "4月12日晚接": "-",
    "4月11日中午考点更换": "-",
    "4月12日中午考点更换": "-"
  };

  carList.forEach(item => {
    const className = item.name;
    let content = "-";
    if(item.school) {
      content = item.school;
    } else if(item.from && item.to) {
      content = `${item.from}→${item.to}`;
    }
    if(classMap.hasOwnProperty(className)) {
      classMap[className] = content;
    }
  });

  return classMap;
}

// 检测重复数据和重复班次
function processOrderData(orders) {
  // 1. 按姓名+电话分组
  const groupMap = {};
  orders.forEach(order => {
    const key = `${order.userName || ''}_${order.userPhone || ''}`;
    if(!groupMap[key]) {
      groupMap[key] = [];
    }
    groupMap[key].push(order);
  });

  const processedOrders = [];
  // 2. 处理每组数据
  Object.values(groupMap).forEach(group => {
    if(group.length === 1) {
      // 单条数据：检测是否有重复班次
      const order = group[0];
      const classNames = order.carList.map(item => item.name);
      const hasRepeatClass = classNames.some((name, index) => classNames.indexOf(name) !== index);
      order.remark = hasRepeatClass ? "重复提交同一班次" : "";
      order.rowClass = hasRepeatClass ? "row-repeat" : "";
      processedOrders.push(order);
    } else {
      // 多条数据：合并
      const firstOrder = group[0];
      // 合并所有班次
      const allCarList = [];
      const classNames = [];
      let hasRepeatClass = false;
      
      group.forEach(order => {
        order.carList.forEach(item => {
          allCarList.push(item);
          if(classNames.includes(item.name)) {
            hasRepeatClass = true;
          }
          classNames.push(item.name);
        });
      });

      // 构建合并后的订单
      const mergedOrder = {
        ...firstOrder,
        carList: allCarList,
        remark: hasRepeatClass ? "重复提交同一班次" : "第二次及之后的提交内容",
        rowClass: hasRepeatClass ? "row-repeat" : "row-multi",
        isMerged: true,
        mergedOrders: group // 保存合并的原始订单
      };
      processedOrders.push(mergedOrder);
    }
  });

  return processedOrders;
}

// 加载订单
function load(){
  const url = `${SERVER_URL}/api/getAllOrders?pwd=${encodeURIComponent(PWD)}`;
  
  fetch(url)
  .then(res=>{
    if(!res.ok) throw new Error(`接口请求失败：${res.status}`);
    return res.json();
  })
  .then(res=>{
    if(res.code===0){
      orderData = res.data;
      // 处理数据（合并、检测重复）
      const processedData = processOrderData(orderData);
      filteredOrderData = processedData;
      renderOrderList(filteredOrderData);
    }else if(res.code===-2){
      alert('密码错误，请重新登录');
      logout();
    }else{
      alert(`加载失败：${res.msg || '未知错误'}`);
    }
  }).catch(err=>{
    console.error('加载订单失败：', err);
    alert(`加载订单失败：${err.message || '请检查后端服务是否正常'}`);
  });
}

// 渲染订单列表
function renderOrderList(orders) {
  let html = '';
  if(orders.length === 0) {
    html = '<tr><td colspan="14" style="text-align:center;color:#999">暂无订单数据</td></tr>';
  } else {
    orders.forEach(item=>{
      const classData = parseClassData(item.carList || []);
      html += `
        <tr data-order-id="${item.id}" class="${item.rowClass || ''}">
          <td class="id-col">${item.orderId || item.id || '-'}</td>
          <td class="name-col">${item.userName || '-'}</td>
          <td class="phone-col">${item.userPhone || '-'}</td>
          <td class="paytype-col">${item.payType || '-'}</td>
          <td class="money-col">${item.total || 0}</td>
          <td class="time-col">${item.createTime || '-'}</td>
          <td class="class-col ${classData['4月11日早送'] === '-' ? 'empty-cell' : ''}">${classData['4月11日早送']}</td>
          <td class="class-col ${classData['4月11日晚接'] === '-' ? 'empty-cell' : ''}">${classData['4月11日晚接']}</td>
          <td class="class-col ${classData['4月12日早送'] === '-' ? 'empty-cell' : ''}">${classData['4月12日早送']}</td>
          <td class="class-col ${classData['4月12日晚接'] === '-' ? 'empty-cell' : ''}">${classData['4月12日晚接']}</td>
          <td class="class-col ${classData['4月11日中午考点更换'] === '-' ? 'empty-cell' : ''}">${classData['4月11日中午考点更换']}</td>
          <td class="class-col ${classData['4月12日中午考点更换'] === '-' ? 'empty-cell' : ''}">${classData['4月12日中午考点更换']}</td>
          <td class="remark-col">${item.remark || '-'}</td>
          <td class="oper-col">
            <button class="edit-btn" onclick="openEditModal('${item.id}')">修改</button>
            <button class="del-btn" onclick="deleteOrder('${item.id}')">删除</button>
          </td>
        </tr>
      `;
    });
  }
  document.getElementById('list').innerHTML = html;
}

// 查询订单
function searchOrders() {
  const name = document.getElementById('searchName').value.trim().toLowerCase();
  const phone = document.getElementById('searchPhone').value.trim();
  
  if(!name && !phone) {
    filteredOrderData = processOrderData(orderData);
    renderOrderList(filteredOrderData);
    return;
  }

  // 筛选逻辑
  const filtered = filteredOrderData.filter(order => {
    const orderName = (order.userName || '').toLowerCase();
    const orderPhone = order.userPhone || '';
    // 姓名匹配 或 电话匹配
    return (name ? orderName.includes(name) : true) && (phone ? orderPhone.includes(phone) : true);
  });

  renderOrderList(filtered);
}

// 重置查询
function resetSearch() {
  document.getElementById('searchName').value = '';
  document.getElementById('searchPhone').value = '';
  filteredOrderData = processOrderData(orderData);
  renderOrderList(filteredOrderData);
}

// 打开修改弹窗
function openEditModal(orderId) {
  // 查找订单
  const order = orderData.find(item => item.id === orderId);
  if(!order) {
    alert('订单不存在');
    return;
  }

  // 填充表单
  document.getElementById('editOrderId').value = orderId;
  document.getElementById('editName').value = order.userName || '';
  document.getElementById('editPhone').value = order.userPhone || '';

  // 渲染班次编辑项
  const container = document.getElementById('classItemsContainer');
  container.innerHTML = '';
  // 现有班次
  (order.carList || []).forEach((item, index) => {
    addClassItemToContainer(item.name, item.school || (item.from && item.to ? `${item.from}→${item.to}` : ''), index);
  });
  // 如果没有班次，添加一个默认的
  if((order.carList || []).length === 0) {
    addClassItemToContainer(classTypes[0], '', 0);
  }

  // 显示弹窗
  document.getElementById('editModal').style.display = 'flex';
}

// 添加班次项到容器
function addClassItemToContainer(classType, school, index) {
  const container = document.getElementById('classItemsContainer');
  const item = document.createElement('div');
  item.className = 'class-item';
  item.dataset.index = index;
  
  // 班次选择
  const classSelect = document.createElement('select');
  classSelect.innerHTML = classTypes.map(type => `<option value="${type}" ${type === classType ? 'selected' : ''}>${type}</option>`).join('');
  
  // 学校选择
  const schoolSelect = document.createElement('select');
  schoolSelect.innerHTML = schoolList.map(schoolItem => `<option value="${schoolItem}" ${schoolItem === school ? 'selected' : ''}>${schoolItem}</option>`).join('');
  
  // 删除按钮
  const delBtn = document.createElement('button');
  delBtn.innerText = '删除';
  delBtn.onclick = function() {
    container.removeChild(item);
  };

  item.appendChild(classSelect);
  item.appendChild(schoolSelect);
  item.appendChild(delBtn);
  container.appendChild(item);
}

// 添加班次项
function addClassItem() {
  const container = document.getElementById('classItemsContainer');
  const index = container.children.length;
  addClassItemToContainer(classTypes[0], schoolList[0], index);
}

// 关闭修改弹窗
function closeEditModal() {
  document.getElementById('editModal').style.display = 'none';
  // 清空表单
  document.getElementById('editOrderId').value = '';
  document.getElementById('editName').value = '';
  document.getElementById('editPhone').value = '';
  document.getElementById('classItemsContainer').innerHTML = '';
}

// 保存修改的订单
function saveEditOrder() {
  const orderId = document.getElementById('editOrderId').value;
  const name = document.getElementById('editName').value.trim();
  const phone = document.getElementById('editPhone').value.trim();
  
  if(!name) {
    alert('姓名不能为空');
    return;
  }

  // 收集班次数据
  const classItems = document.querySelectorAll('#classItemsContainer .class-item');
  const carList = [];
  classItems.forEach(item => {
    const classType = item.querySelector('select:first-child').value;
    const school = item.querySelector('select:last-child').value;
    carList.push({
      name: classType,
      school: school
    });
  });

  // 构建修改数据
  const editData = {
    pwd: PWD,
    id: orderId,
    userName: name,
    userPhone: phone,
    carList: carList,
    remark: "已修改" // 备注改为已修改
  };

  // 提交修改
  fetch(`${SERVER_URL}/api/updateOrder`, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
    },
    body: JSON.stringify(editData)
  })
  .then(res=>{
    if(!res.ok) throw new Error(`修改请求失败：${res.status}`);
    return res.json();
  })
  .then(res=>{
    if(res.code===0){
      alert('修改成功！');
      closeEditModal();
      // 重新加载数据
      load();
      // 修改后行标蓝（重新加载后会自动处理）
    }else if(res.code===-2){
      alert('密码错误，修改失败');
      logout();
    }else{
      alert(`修改失败：${res.msg || '订单不存在'}`);
    }
  })
  .catch(err=>{
    console.error('修改订单失败：', err);
    alert(`修改失败：${err.message || '请检查后端接口是否正常'}`);
  });
}

// 删除订单
function deleteOrder(orderId){
  if(!orderId || !confirm(`确定要删除订单【${orderId}】吗？此操作不可恢复！`)){
    return;
  }

  fetch(`${SERVER_URL}/api/deleteOrder`, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
    },
    body: JSON.stringify({ 
      pwd: PWD,
      id: orderId
    })
  })
  .then(res=>{
    if(!res.ok) throw new Error(`删除请求失败：${res.status}`);
    return res.json();
  })
  .then(res=>{
    if(res.code===0){
      alert('删除成功！');
      load();
    }else if(res.code===-2){
      alert('密码错误，删除失败');
      logout();
    }else{
      alert(`删除失败：${res.msg || '订单不存在'}`);
    }
  })
  .catch(err=>{
    console.error('删除订单失败：', err);
    alert(`删除失败：${err.message || '请检查后端接口是否正常'}`);
  });
}

// 导出Excel
function exportExcel(){
  if(filteredOrderData.length === 0){
    alert('暂无订单数据可导出');
    return;
  }
  const header = [
    '订单ID', '姓名', '联系电话', '支付方式', '金额(元)', '提交时间',
    '4月11日早送', '4月11日晚接', '4月12日早送',
    '4月12日晚接', '4月11日中午考点更换',
    '4月12日中午考点更换', '备注'
  ];
  const data = [header];
  
  filteredOrderData.forEach(item=>{
    const classData = parseClassData(item.carList || []);
    data.push([
      item.orderId || item.id || '-',
      item.userName || '-',
      item.userPhone || '-',
      item.payType || '-',
      item.total || 0,
      item.createTime || '-',
      classData['4月11日早送'],
      classData['4月11日晚接'],
      classData['4月12日早送'],
      classData['4月12日晚接'],
      classData['4月11日中午考点更换'],
      classData['4月12日中午考点更换'],
      item.remark || '-'
    ]);
  });
  
  const ws = XLSX.utils.aoa_to_sheet(data);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "订单列表");
  XLSX.writeFile(wb, `订单列表_${new Date().toLocaleDateString()}.xlsx`);
}
